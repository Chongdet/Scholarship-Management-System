{% extends "layouts/base_stu.html" %}

{% block content %}
<style>
    /* CSS เฉพาะหน้าสมัครทุน */
    #drop-zone { border: 2px dashed #93c5fd; transition: border-color 0.2s, background-color 0.2s; }
    #drop-zone.drag-over { border-color: #1e3a8a; background-color: #eff6ff; }
    .form-input:focus { outline: none; box-shadow: 0 0 0 3px rgba(250,204,21,0.4); border-color: #1e3a8a; }
    .section-card { background:#fff; border-radius:1rem; border:1px solid #f0f4f8; padding:2rem; margin-bottom:1.5rem; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
    .section-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1.25rem; padding-bottom:0.75rem; border-bottom:2px solid #eff6ff; }
    .section-num { width:2.25rem; height:2.25rem; background:#1e3a8a; color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.9rem; flex-shrink:0; }
</style>

<div class="max-w-5xl mx-auto py-10">
    <div class="mb-6 text-center">
        <h2 class="text-3xl font-extrabold text-blue-900 mb-1">📝 ฟอร์มสมัครทุนการศึกษา</h2>
        <p class="text-gray-500 text-sm">กรอกข้อมูลให้ครบถ้วนแล้วแนบเอกสารประกอบการสมัคร</p>
    </div>

    <form id="apply-form" method="POST" action="{{ url_for('student.apply_scholarship') }}" enctype="multipart/form-data">
        <div class="section-card">
            <div class="section-header">
                <div class="section-num">★</div>
                <h3 class="text-base font-bold text-blue-900">ทุนการศึกษาที่ต้องการสมัคร</h3>
            </div>
            <select name="scholarship_id" required class="form-input w-full border border-gray-300 rounded-xl px-4 py-3 text-sm">
                <option value="">-- เลือกทุนการศึกษา --</option>
                {% for sch in scholarships %}
                <option value="{{ sch.id }}">{{ sch.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="section-card">
            <div id="drop-zone" class="rounded-2xl p-10 text-center cursor-pointer mb-4" onclick="document.getElementById('file-input').click()">
                <div class="text-5xl mb-3">📂</div>
                <p class="font-semibold text-gray-600 text-sm">คลิกหรือลากไฟล์มาวางที่นี่ (ไม่เกิน 5MB)</p>
            </div>
            <input type="file" id="file-input" name="documents" multiple class="hidden">
            <ul id="file-list" class="space-y-2 mb-5"></ul>

            <div class="flex justify-end gap-3 pt-4 border-t">
                <button type="submit" class="bg-blue-900 text-white font-bold px-8 py-3 rounded-xl hover:bg-yellow-400 hover:text-blue-900 transition-all">
                    📨 ยืนยันการสมัคร
                </button>
            </div>
        </div>
    </form>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const fileList = document.getElementById('file-list');
    fileInput.addEventListener('change', () => {
        fileList.innerHTML = '';
        Array.from(fileInput.files).forEach(file => {
            const li = document.createElement('li');
            li.className = "p-2 bg-blue-50 text-blue-800 rounded-lg text-xs border border-blue-100 flex justify-between";
            li.innerHTML = `<span>📄 ${file.name}</span> <span>${(file.size/1024/1024).toFixed(2)} MB</span>`;
            fileList.appendChild(li);
        });
    });
</script>
{% endblock %}
